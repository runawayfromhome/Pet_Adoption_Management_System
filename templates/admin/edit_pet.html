{% extends "admin/admin_layout.html" %}
{% block content %}

<div class="mb-4">
    <a href="javascript:history.back()" class="text-decoration-none text-muted small fw-bold text-uppercase d-inline-flex align-items-center">
        <svg width="14" height="14" fill="currentColor" class="me-2" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8z"/></svg>
        Back to Previous Page
    </a>
</div>

<div class="card p-3 p-md-4 border-0 shadow-sm" style="border-top: 4px solid var(--accent-gold) !important; border-radius: 12px;">
    <h4 class="fw-bold mb-4" style="color: var(--primary-navy);">Edit Profile: {{ pet.name }}</h4>

    <form action="{{ url_for('edit_pet', pet_id=pet.id) }}" method="POST" enctype="multipart/form-data">
        <div class="row g-4">
            
            <div class="col-12 col-md-4 text-center border-md-end">
                <label class="form-label small fw-bold text-muted text-uppercase mb-3 d-block">Current Photo</label>
                <div class="position-relative d-inline-block w-100 mb-3" style="max-width: 300px;">
                    <img src="{{ url_for('static', filename='uploads/' + pet.photo) if pet.photo else 'https://via.placeholder.com/300' }}" 
                         class="img-fluid rounded border shadow-sm" 
                         style="aspect-ratio: 1/1; object-fit: cover; width: 100%;">
                </div>
                
                <div class="px-2">
                    <input type="file" name="photo" class="form-control form-control-sm rounded-0 shadow-sm" accept=".jpg,.jpeg,.png,.webp">
                    <small class="text-muted x-small d-block mt-2">Leave blank to keep the current photo.</small>
                </div>
            </div>

            <div class="col-12 col-md-8">
                <div class="row g-3">
                    <div class="col-12 col-sm-6">
                        <label class="form-label small fw-bold text-muted text-uppercase">Pet Name</label>
                        <input type="text" name="name" class="form-control rounded-0 py-2 py-md-1" value="{{ pet.name }}" required>
                    </div>
                    <div class="col-12 col-sm-6">
                        <label class="form-label small fw-bold text-muted text-uppercase">Breed</label>
                        <input type="text" name="breed" class="form-control rounded-0 py-2 py-md-1" value="{{ pet.breed }}" required>
                    </div>

                    <div class="mb-3">
    <label class="form-label small fw-bold text-muted text-uppercase">Current Status</label>
    <select class="form-control rounded-0 bg-light" disabled>
        <option value="{{ pet.status }}" selected>{{ pet.status }}</option>
    </select>
    <input type="hidden" name="status" value="{{ pet.status }}">
    <p class="x-small text-muted mt-1 italic">
        Note: Status is locked here to maintain data integrity. Use the <strong>Logistics & Appointments</strong> tab to finalize adoptions.
    </p>
</div>
                    <div class="col-6 col-md-4">
                        <label class="form-label small fw-bold text-muted text-uppercase">Age</label>
                        <select name="age_category" class="form-select rounded-0">
                            <option value="Puppy" {% if pet.age_category == 'Puppy' %}selected{% endif %}>Puppy</option>
                            <option value="Kitten" {% if pet.age_category == 'Kitten' %}selected{% endif %}>Kitten</option>
                            <option value="Young" {% if pet.age_category == 'Young' %}selected{% endif %}>Young</option>
                            <option value="Adult" {% if pet.age_category == 'Adult' %}selected{% endif %}>Adult</option>
                            <option value="Senior" {% if pet.age_category == 'Senior' %}selected{% endif %}>Senior</option>
                        </select>
                    </div>
                    <div class="col-6 col-md-4">
                        <label class="form-label small fw-bold text-muted text-uppercase">Gender</label>
                        <select name="gender" class="form-select rounded-0">
                            <option value="Male" {% if pet.gender == 'Male' %}selected{% endif %}>Male</option>
                            <option value="Female" {% if pet.gender == 'Female' %}selected{% endif %}>Female</option>
                        </select>
                    </div>

                    <div class="col-6 col-md-4">
                        <label class="form-label small fw-bold text-muted text-uppercase">Size</label>
                        <select name="size" class="form-select rounded-0">
                            <option value="Small" {% if pet.size == 'Small' %}selected{% endif %}>Small</option>
                            <option value="Medium" {% if pet.size == 'Medium' %}selected{% endif %}>Medium</option>
                            <option value="Large" {% if pet.size == 'Large' %}selected{% endif %}>Large</option>
                        </select>
                    </div>
                    <div class="col-6 col-md-4">
                        <label class="form-label small fw-bold text-muted text-uppercase">Energy</label>
                        <select name="energy_level" class="form-select rounded-0">
                            <option value="Low" {% if pet.energy_level == 'Low' %}selected{% endif %}>Low</option>
                            <option value="Moderate" {% if pet.energy_level == 'Moderate' %}selected{% endif %}>Moderate</option>
                            <option value="High" {% if pet.energy_level == 'High' %}selected{% endif %}>High</option>
                        </select>
                    </div>
                    <div class="col-6 col-md-4">
                        <label class="form-label small fw-bold text-muted text-uppercase">Fixed?</label>
                        <select name="spayed_neutered" class="form-select rounded-0">
                            <option value="Yes" {% if pet.spayed_neutered == 'Yes' %}selected{% endif %}>Yes</option>
                            <option value="No" {% if pet.spayed_neutered == 'No' %}selected{% endif %}>No</option>
                        </select>
                    </div>

                    <div class="col-12 col-sm-6">
                        <label class="form-label small fw-bold text-muted text-uppercase">Vaccination Status</label>
                        <input type="text" name="vac_status" class="form-control rounded-0" placeholder="e.g., Complete" value="{{ pet.vac_status }}">
                    </div>
                    <div class="col-12 col-sm-6">
                        <label class="form-label small fw-bold text-muted text-uppercase">Last Vaccine Date</label>
                        <input type="text" name="vac_date" class="form-control rounded-0" placeholder="e.g., Oct 2025" value="{{ pet.vac_date }}">
                    </div>
                </div>
            </div>
            
            <div class="col-12 mt-4 pt-4 border-top">
                <div class="mb-3">
                    <label class="form-label small fw-bold text-muted text-uppercase">Special Medical Needs</label>
                    <input type="text" name="special_needs" class="form-control rounded-0" placeholder="Leave as N/A if none" value="{{ pet.special_needs }}">
                </div>
                
                <div class="mb-0">
                    <label class="form-label small fw-bold text-muted text-uppercase">Behavioral Notes & Description</label>
                    <textarea name="other_description" class="form-control rounded-0" rows="5" placeholder="Personality, history, ideal home...">{{ pet.other_description }}</textarea>
                </div>
            </div>
        </div>
        
        <div class="d-grid d-md-flex justify-content-md-end mt-4 pt-3 border-top gap-2">
            <button type="submit" class="btn btn-navy rounded-0 px-md-5 fw-bold order-1 order-md-2">SAVE CHANGES</button>
            <a href="javascript:history.back()" class="btn btn-light rounded-0 px-md-4 border order-2 order-md-1">CANCEL</a>
        </div>
    </form>
</div>

<style>
    .x-small { font-size: 0.7rem; }
    .bg-navy { background-color: var(--primary-navy) !important; color: white; }
    .btn-navy { background-color: var(--primary-navy); color: white; transition: 0.3s; }
    .btn-navy:hover { background-color: #2c3e50; color: var(--accent-gold); }

    /* Custom Mobile Borders */
    @media (min-width: 768px) {
        .border-md-end { border-right: 1px solid #dee2e6 !important; }
    }
    
    @media (max-width: 767px) {
        .form-label { margin-bottom: 2px; }
        .form-control, .form-select { font-size: 16px !important; } /* Prevents iOS auto-zoom on focus */
    }
</style>

{% endblock %}
