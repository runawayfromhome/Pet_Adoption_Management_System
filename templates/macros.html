{% macro render_pet_table(pet_list, empty_message) %}
<div class="table-responsive">
    <table class="table align-middle mb-0">
        <thead>
            <tr class="text-muted x-small text-uppercase ls-1">
                <th class="ps-4">Pet Details</th>
                <th class="d-none d-md-table-cell">Breed</th>
                <th>Status</th>
                <th class="text-end pe-4">Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for pet in pet_list %}
            <tr class="hover-row">
                <td class="ps-4">
                    <div class="d-flex align-items-center gap-3">
                        <img src="{{ upload_url(pet.photo) if pet.photo else url_for('static', filename='images/default-pet.png') }}" 
                             class="rounded shadow-sm" style="width: 45px; height: 45px; object-fit: cover; flex-shrink: 0;">
                        
                        <div>
                            <a href="{{ url_for('admin_view_pet', pet_id=pet.id) }}" 
                               class="fw-bold text-decoration-none d-block" 
                               style="color: var(--primary-navy); cursor: pointer; position: relative; z-index: 5;">
                                {{ pet.name }} <span style="font-size: 0.8rem;">&nearr;</span>
                            </a>
                            {% if pet.special_needs == 'Yes' %}
                                <span class="badge bg-warning text-dark rounded-0 px-2" style="font-size: 0.55rem;">SPECIAL NEEDS</span>
                            {% endif %}
                        </div>
                    </div>
                </td>
                <td class="small d-none d-md-table-cell">{{ pet.breed }}</td>
                <td>
                    <span class="badge rounded-0 px-3 
                        {% if pet.status == 'Available' %}bg-success
                        {% elif pet.status == 'Approved' %}bg-warning
                        {% elif pet.status == 'Declined' %}bg-danger
                        {% else %}bg-secondary{% endif %}" 
                        style="font-size: 0.65rem; letter-spacing: 0.5px;">
                        {{ pet.status|upper }}
                    </span>
                </td>
                <td class="text-end pe-4">
                    <div class="btn-group shadow-sm">
                        <button class="btn btn-sm btn-outline-dark px-2 px-md-3" data-bs-toggle="modal" data-bs-target="#editModal{{pet.id}}">Edit</button>
                        <a href="{{ url_for('delete_pet', pet_id=pet.id) }}" class="btn btn-sm btn-outline-danger px-2 px-md-3" onclick="return confirm('Permanently remove this pet?')">Delete</a>
                    </div>
                </td>
            </tr>
            {% else %}
            <tr><td colspan="4" class="text-center py-5 text-muted italic">{{ empty_message }}</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endmacro %}
